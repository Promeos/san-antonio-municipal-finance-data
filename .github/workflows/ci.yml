name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fast-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run PDF-free tests
        run: pytest tests/test_validate_datasets.py tests/test_unit_scrapers.py -q
      - name: Validate published datasets
        run: python scripts/validate_datasets.py
