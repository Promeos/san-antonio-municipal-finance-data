name: integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  pdf-backed-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download source PDFs
        run: |
          python scripts/download_budgets.py
          python scripts/download_acfrs.py
      - name: Run scraper regression tests
        run: pytest tests/test_scrape_budgets.py tests/test_scrape_cip.py tests/test_scrape_acfr.py -q
      - name: Regenerate published datasets
        run: |
          python src/scrape_budgets.py
          python src/scrape_cip.py
          python src/scrape_acfr.py
      - name: Validate datasets
        run: |
          python scripts/validate_datasets.py
          python scripts/validate_all_funds_revenue.py
